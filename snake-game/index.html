<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐍 Retro Snake — Aman Shukla</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D1117;
      font-family: 'Fira Code', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; color: #fff;
      overflow: hidden;
    }
    /* Starfield background */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(168,85,247,.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(255,111,97,.1) 0%, transparent 50%);
    }
    h1 { font-size: 2rem; margin-bottom: 6px; z-index: 1;
         background: linear-gradient(135deg,#A855F7,#FF6F61);
         -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: .85rem; color: #888; margin-bottom: 18px; z-index: 1; }
    #score-board { display: flex; gap: 30px; margin-bottom: 14px; z-index: 1; }
    #score-board span { font-size: 1rem; color: #A855F7; }
    canvas {
      z-index: 1;
      border: 2px solid rgba(168,85,247,.4);
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(168,85,247,.25), inset 0 0 60px rgba(168,85,247,.05);
      background: rgba(13,17,23,.9);
      backdrop-filter: blur(12px);
    }
    .controls { display: none; z-index: 1; margin-top: 16px; gap: 8px; }
    .controls button {
      width: 54px; height: 54px; font-size: 1.4rem;
      border: 1px solid rgba(168,85,247,.5); border-radius: 10px;
      background: rgba(168,85,247,.12); color: #fff; cursor: pointer;
    }
    .controls button:active { background: rgba(168,85,247,.35); }
    @media (pointer: coarse) { .controls { display: grid; grid-template-columns: repeat(3,54px); } }
    #restart { margin-top: 14px; z-index: 1; padding: 10px 28px;
               font-family: inherit; font-size: .95rem; border: none;
               border-radius: 8px; cursor: pointer; display: none;
               background: linear-gradient(135deg,#A855F7,#FF6F61); color: #fff; }
    #restart:hover { opacity: .85; }
    .back { position: fixed; top: 16px; left: 16px; z-index: 2;
            color: #A855F7; text-decoration: none; font-size: .85rem; }
  </style>
</head>
<body>
  <a class="back" href="https://github.com/amanshukla2004">← Back to Profile</a>
  <h1>🐍 RETRO SNAKE</h1>
  <p class="sub">Arrow keys / WASD / Swipe to play</p>
  <div id="score-board">
    <span>Score: <b id="score">0</b></span>
    <span>Best: <b id="best">0</b></span>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <div></div>
    <button onclick="setDir(0,-1)">▲</button>
    <div></div>
    <button onclick="setDir(-1,0)">◀</button>
    <button onclick="setDir(0,1)">▼</button>
    <button onclick="setDir(1,0)">▶</button>
  </div>
  <button id="restart" onclick="init()">Play Again</button>

  <script>
    const cvs = document.getElementById('game');
    const ctx = cvs.getContext('2d');
    const SIZE = 20, COLS = cvs.width / SIZE, ROWS = cvs.height / SIZE;
    let snake, food, dir, nextDir, score, best = +localStorage.getItem('snakeBest') || 0, running;
    document.getElementById('best').textContent = best;

    function init() {
      snake = [{x:10,y:10}]; dir = {x:1,y:0}; nextDir = {x:1,y:0};
      score = 0; document.getElementById('score').textContent = 0;
      document.getElementById('restart').style.display = 'none';
      placeFood(); running = true; loop();
    }
    function placeFood() {
      do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
      while (snake.some(s=>s.x===food.x&&s.y===food.y));
    }
    function setDir(x,y) { if(dir.x!==-x||dir.y!==-y) nextDir={x,y}; }
    document.addEventListener('keydown', e => {
      switch(e.key){
        case 'ArrowUp': case 'w': setDir(0,-1); break;
        case 'ArrowDown': case 's': setDir(0,1); break;
        case 'ArrowLeft': case 'a': setDir(-1,0); break;
        case 'ArrowRight': case 'd': setDir(1,0); break;
      }
    });
    /* swipe */
    let tx,ty;
    cvs.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
    cvs.addEventListener('touchend',e=>{
      let dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
    });

    function loop() {
      if(!running) return;
      setTimeout(()=>{ update(); draw(); loop(); }, 100);
    }
    function update() {
      dir = nextDir;
      const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
      if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
        running=false; if(score>best){best=score;localStorage.setItem('snakeBest',best);
        document.getElementById('best').textContent=best;}
        document.getElementById('restart').style.display='inline-block'; return;
      }
      snake.unshift(head);
      if(head.x===food.x&&head.y===food.y){ score++; document.getElementById('score').textContent=score; placeFood(); }
      else snake.pop();
    }
    function draw() {
      ctx.clearRect(0,0,cvs.width,cvs.height);
      /* grid */
      ctx.strokeStyle='rgba(168,85,247,.06)';
      for(let i=0;i<COLS;i++) for(let j=0;j<ROWS;j++) ctx.strokeRect(i*SIZE,j*SIZE,SIZE,SIZE);
      /* food */
      ctx.shadowColor='#FF6F61'; ctx.shadowBlur=14;
      ctx.fillStyle='#FF6F61';
      ctx.beginPath(); ctx.arc(food.x*SIZE+SIZE/2,food.y*SIZE+SIZE/2,SIZE/2-2,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      /* snake */
      snake.forEach((s,i)=>{
        const t=i/snake.length;
        ctx.fillStyle=`hsl(${270-t*40},80%,${65-t*15}%)`;
        ctx.shadowColor='#A855F7'; ctx.shadowBlur=i===0?12:4;
        ctx.beginPath(); ctx.roundRect(s.x*SIZE+1,s.y*SIZE+1,SIZE-2,SIZE-2,[4]); ctx.fill();
      });
      ctx.shadowBlur=0;
    }
    init();
  </script>
</body>
</html>
